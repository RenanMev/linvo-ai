services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: linvo-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: linvo_ai
      POSTGRES_USER: linvo_ai
      POSTGRES_PASSWORD: linvo_ai_dev
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linvo_ai -d linvo_ai"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
